# =============================================================
# MediaGeek SaaS — Nginx Configuration
# Substitua SEU_DOMINIO.com pelo domínio real antes de usar
# =============================================================

upstream mediageek_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    # ── SSL (preenchido pelo Certbot automaticamente) ────────
    # ssl_certificate /etc/letsencrypt/live/SEU_DOMINIO.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Segurança ────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/mediageek_access.log;
    error_log  /var/log/nginx/mediageek_error.log;

    # ── Arquivos estáticos Next.js (cache agressivo) ─────────
    location /_next/static/ {
        alias /var/www/mediageek/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        alias /var/www/mediageek/public/favicon.ico;
        expires 30d;
        access_log off;
    }

    location /public/ {
        alias /var/www/mediageek/public/;
        expires 30d;
        access_log off;
    }

    # ── Proxy → Next.js ──────────────────────────────────────
    location / {
        proxy_pass http://mediageek_app;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Upload máximo (para geração de imagens/docs)
        client_max_body_size 50M;
    }
}
